<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #c8f135;
      --accent2: #ff6b35;
      --red: #ff4757;
      --green: #c8f135;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* ANIMATED BACKGROUND */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(200,241,53,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(255,107,53,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 100px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
      animation: fadeDown 0.5s ease both;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .date-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* BALANCE CARD */
    .balance-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .balance-card::after {
      content: '₹';
      position: absolute;
      right: -10px;
      top: -20px;
      font-size: 140px;
      font-weight: 800;
      color: rgba(200,241,53,0.04);
      font-family: 'Syne', sans-serif;
      pointer-events: none;
    }

    .balance-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .balance-amount {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 20px;
      font-family: 'DM Mono', monospace;
      transition: color 0.3s;
    }

    .balance-amount.positive { color: var(--accent); }
    .balance-amount.negative { color: var(--red); }

    .balance-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: var(--surface2);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .stat-dot.inc { background: var(--green); }
    .stat-dot.exp { background: var(--red); }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 500;
    }

    .stat-value.inc { color: var(--green); }
    .stat-value.exp { color: var(--red); }

    /* ADD TRANSACTION */
    .add-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 14px;
    }

    .toggle-btn {
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn.active-inc {
      background: var(--accent);
      color: #0d0d0d;
    }

    .toggle-btn.active-exp {
      background: var(--red);
      color: white;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
    }

    select option {
      background: var(--surface2);
    }

    .add-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      margin-top: 4px;
    }

    .add-btn:active { transform: scale(0.97); opacity: 0.9; }

    /* TRANSACTIONS LIST */
    .transactions-section {
      animation: fadeUp 0.5s ease 0.3s both;
    }

    .tx-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.3s ease both;
      transition: border-color 0.2s;
    }

    .tx-item:hover { border-color: #3a3a3a; }

    .tx-left { display: flex; align-items: center; gap: 12px; }

    .tx-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .tx-icon.inc { background: rgba(200,241,53,0.12); }
    .tx-icon.exp { background: rgba(255,71,87,0.12); }

    .tx-desc {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .tx-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }

    .tx-right { display: flex; align-items: center; gap: 10px; }

    .tx-amount {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
    }

    .tx-amount.inc { color: var(--green); }
    .tx-amount.exp { color: var(--red); }

    .del-btn {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
      line-height: 1;
    }

    .del-btn:hover { color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-text { font-size: 13px; line-height: 1.6; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0d0d0d;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="logo">Finance Tracker</div>
      </div>
      <div class="date-pill" id="dateDisplay"></div>
    </header>

    <!-- BALANCE CARD -->
    <div class="balance-card">
      <div class="balance-label">Total Balance</div>
      <div class="balance-amount" id="balanceDisplay">₹0.00</div>
      <div class="balance-row">
        <div class="stat-box">
          <div class="stat-label"><span class="stat-dot inc"></span> Income</div>
          <div class="stat-value inc" id="incomeDisplay">₹0.00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label"><span class="stat-dot exp"></span> Expense</div>
          <div class="stat-value exp" id="expenseDisplay">₹0.00</div>
        </div>
      </div>
    </div>

    <!-- ADD TRANSACTION -->
    <div class="add-section">
      <div class="section-title">Add Transaction</div>
      <div class="type-toggle">
        <button class="toggle-btn active-inc" id="incBtn" onclick="setType('income')">+ Income</button>
        <button class="toggle-btn" id="expBtn" onclick="setType('expense')">− Expense</button>
      </div>
      <div class="input-group">
        <label class="input-label">Description</label>
        <input type="text" id="descInput" placeholder="e.g. Salary, Groceries..." maxlength="40" />
      </div>
      <div class="input-group">
        <label class="input-label">Amount (₹)</label>
        <input type="number" id="amountInput" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="input-group">
        <label class="input-label">Category</label>
        <select id="categoryInput">
          <option value="💰 General">💰 General</option>
          <option value="🍔 Food">🍔 Food</option>
          <option value="🚗 Transport">🚗 Transport</option>
          <option value="🛒 Shopping">🛒 Shopping</option>
          <option value="💊 Health">💊 Health</option>
          <option value="🎮 Entertainment">🎮 Entertainment</option>
          <option value="📚 Education">📚 Education</option>
          <option value="🏠 Housing">🏠 Housing</option>
          <option value="💼 Salary">💼 Salary</option>
          <option value="📈 Investment">📈 Investment</option>
        </select>
      </div>
      <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
    </div>

    <!-- TRANSACTIONS -->
    <div class="transactions-section">
      <div class="tx-header">
        <div class="section-title" style="margin:0">History</div>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
      </div>
      <div class="tx-list" id="txList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentType = 'income';
    let transactions = JSON.parse(localStorage.getItem('ft_txns') || '[]');

    // DATE
    const now = new Date();
    document.getElementById('dateDisplay').textContent =
      now.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

    function setType(type) {
      currentType = type;
      const incBtn = document.getElementById('incBtn');
      const expBtn = document.getElementById('expBtn');
      if (type === 'income') {
        incBtn.className = 'toggle-btn active-inc';
        expBtn.className = 'toggle-btn';
      } else {
        incBtn.className = 'toggle-btn';
        expBtn.className = 'toggle-btn active-exp';
      }
    }

    function addTransaction() {
      const desc = document.getElementById('descInput').value.trim();
      const amount = parseFloat(document.getElementById('amountInput').value);
      const category = document.getElementById('categoryInput').value;

      if (!desc) { showToast('Description likhein!'); return; }
      if (!amount || amount <= 0) { showToast('Valid amount daalen!'); return; }

      const tx = {
        id: Date.now(),
        type: currentType,
        desc,
        amount,
        category,
        date: new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })
      };

      transactions.unshift(tx);
      save();
      render();

      document.getElementById('descInput').value = '';
      document.getElementById('amountInput').value = '';
      showToast(currentType === 'income' ? '✓ Income added!' : '✓ Expense added!');
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      save();
      render();
    }

    function clearAll() {
      if (transactions.length === 0) return;
      if (confirm('Saari transactions delete karein?')) {
        transactions = [];
        save();
        render();
      }
    }

    function save() {
      localStorage.setItem('ft_txns', JSON.stringify(transactions));
    }

    function fmt(n) {
      return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function render() {
      const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const balance = income - expense;

      const balEl = document.getElementById('balanceDisplay');
      balEl.textContent = fmt(balance);
      balEl.className = 'balance-amount ' + (balance >= 0 ? 'positive' : 'negative');

      document.getElementById('incomeDisplay').textContent = fmt(income);
      document.getElementById('expenseDisplay').textContent = fmt(expense);

      const list = document.getElementById('txList');
      if (transactions.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📊</div>
          <div class="empty-text">Abhi koi transaction nahi hai.<br>Upar se add karein.</div>
        </div>`;
        return;
      }

      list.innerHTML = transactions.map((t, i) => `
        <div class="tx-item" style="animation-delay:${i * 0.04}s">
          <div class="tx-left">
            <div class="tx-icon ${t.type === 'income' ? 'inc' : 'exp'}">
              ${t.category.split(' ')[0]}
            </div>
            <div>
              <div class="tx-desc">${escHtml(t.desc)}</div>
              <div class="tx-meta">
                <span>${t.category.split(' ').slice(1).join(' ')}</span>
                <span>·</span>
                <span>${t.date}</span>
              </div>
            </div>
          </div>
          <div class="tx-right">
            <div class="tx-amount ${t.type === 'income' ? 'inc' : 'exp'}">
              ${t.type === 'income' ? '+' : '−'}${fmt(t.amount)}
            </div>
            <button class="del-btn" onclick="deleteTransaction(${t.id})">✕</button>
          </div>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTransaction();
    });

    render();
  </script>
</body>
</html>
